<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de Dactylographie</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap');

    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Quicksand', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #487cff, #6ed0ff);
        color: white;
    }

    h1 {
        margin-bottom: 40px;
        font-size: 2.5em;
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #texte {
        margin-bottom: 20px;
        font-size: 1.3em;
        padding: 20px;
        max-width: 700px;
        text-align: center;
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    textarea {
        width: 100%;
        max-width: 700px;
        height: 120px;
        font-size: 1.2em;
        border-radius: 20px;
        padding: 20px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: white;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        resize: none;
        text-align: center;
        transition: all 0.3s ease;
    }

    textarea:focus {
        outline: none;
        box-shadow: 0 8px 30px rgba(255,255,255,0.3);
        transform: scale(1.02);
    }

    button {
        margin-top: 20px;
        width: 100%;
        max-width: 700px;
        padding: 20px;
        font-size: 1.2em;
        border: none;
        border-radius: 20px;
        color: white;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        cursor: pointer;
        transition: all 0.3s ease;
    }

    button:hover {
        background: rgba(255,255,255,0.3);
        transform: scale(1.05);
    }

    #resultats {
        margin-top: 30px;
        font-size: 1.3em;
        padding: 20px;
        text-align: center;
        max-width: 700px;
        background: rgba(255,255,255,0.1);
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        white-space: pre-line;
    }

    #timerOverlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0,0,0,0.8);
        color: white;
        font-size: 15vw;
        font-weight: bold;
        
        align-items: center;
        justify-content: center;
        z-index: 1000;
        text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        transition: all 0.3s ease;
    }

</style>
</head>
<body>

<h1>Test de Dactylographie</h1>
<div id="texte">Appuyez sur "Commencer" pour débuter.</div>
<textarea id="input" disabled></textarea>
<button id="demarrer">Commencer</button>
<div id="resultats"></div>
<div id="timerOverlay"></div>
<body oncopy="return false" oncut="return false" onpaste="return false"></body>

<script>
const phrases = [
    "Le ciel est bleu et les oiseaux chantent.",
    "Aujourd'hui il fait très beau.",
    "Les chats aiment dormir au soleil.",
    "L'été arrive avec ses longues journées.",
    "La programmation peut être très amusante."
];

const input = document.getElementById('input');
const resultats = document.getElementById('resultats');
const demarrer = document.getElementById('demarrer');
const timerOverlay = document.getElementById('timerOverlay');

let texte = '';
let debutTime;

demarrer.addEventListener('click', () => {
    input.disabled = true;
    resultats.innerText = '';

    let countdown = 3;
    timerOverlay.style.display = 'flex';
    timerOverlay.innerText = countdown;

    const countdownInterval = setInterval(() => {
        countdown--;
        if(countdown > 0) {
            timerOverlay.innerText = countdown;
        } else {
            clearInterval(countdownInterval);
            timerOverlay.style.display = 'none';
            texte = phrases[Math.floor(Math.random() * phrases.length)];
            document.getElementById('texte').innerText = texte;

            input.value = '';
            input.disabled = false;
            input.focus();
            debutTime = new Date();
        }
    }, 1000);
});

input.addEventListener('input', () => {
    if(input.value === texte) {
        let finTime = new Date();
        let secondes = (finTime - debutTime) / 1000;

        let mots = texte.split(' ').length;
        let mpm = Math.round((mots / secondes) * 60);

        let correct = 0;
        for(let i = 0; i < texte.length; i++) {
            if(input.value[i] === texte[i]) correct++;
        }
        let precision = Math.round((correct / texte.length) * 100);

        resultats.innerText = `🎉 Bravo !\nTemps : ${secondes.toFixed(2)} s\nVitesse : ${mpm} mots/min\nPrécision : ${precision}%`;
        input.disabled = true;
    }
});
</script>

</body>
</html>
